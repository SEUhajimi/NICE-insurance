server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/nice?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  # 生产环境通过 JWT_SECRET 环境变量注入，本地开发使用默认值
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24小时（毫秒）
