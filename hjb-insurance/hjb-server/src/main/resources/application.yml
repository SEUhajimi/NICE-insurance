server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/nice?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  # Base64编码的密钥，至少32字节（256位）用于HS256签名，生产环境请替换为随机密钥
  secret: aGpiLWluc3VyYW5jZS1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMzItY2hhcnMhIQ==
  expiration: 86400000  # 24小时（毫秒）
